<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Work | Cork Jar</title>
    <meta
      name="description"
      content="The portfolio of Tyler Law: street and editorial, landscape and travel, portrait and lifestyle photography."
    />
    <link rel="canonical" href="https://corkjar.studio/work.html" />
    <meta property="og:title" content="Work | Cork Jar" />
    <meta property="og:description" content="Selected photography by Tyler Law." />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0a0a'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='32' fill='%23f7f6f3' text-anchor='middle'%3ECJ%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              paper: "#0c0d10",
              paper2: "#16181d",
              ink: "#f3f4f6",
              ink2: "#c4c7cd",
              muted: "#82868f",
              accent: "#8fb0c9",
              night: "#0a0a0c",
            },
            fontFamily: {
              display: ["Space Grotesk", "Inter", "sans-serif"],
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>
  <body class="font-sans">
    <div class="scroll-progress" aria-hidden="true"></div>
    <a
      href="#main"
      class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[80] focus:bg-ink focus:text-paper focus:px-4 focus:py-2"
      >Skip to content</a
    >
    <div id="site-header"></div>

    <main id="main" class="pt-28">
      <section class="max-w-[1400px] mx-auto px-5 sm:px-8 lg:px-12">
        <p class="eyebrow reveal">Portfolio</p>
        <h1 class="display-lg mt-3 reveal reveal-1">The Work</h1>
        <p class="lede mt-6 max-w-xl reveal reveal-2">
          A growing archive across three threads: the street, the wild, and the
          people in between. Click any frame to view it full size.
        </p>

        <div
          class="flex flex-wrap items-center justify-between gap-6 mt-12 mb-10 reveal reveal-3"
        >
          <div class="flex flex-wrap gap-8">
            <button class="filter-pill active" data-cat="all">All</button>
            <button class="filter-pill" data-cat="street-editorial">
              Street & Editorial
            </button>
            <button class="filter-pill" data-cat="landscape-travel">
              Landscape & Travel
            </button>
            <button class="filter-pill" data-cat="architecture">
              Architecture & Still
            </button>
          </div>
          <button id="camera-open" class="cr-trigger" type="button">
            <span class="dot-live"></span> Camera mode
          </button>
        </div>
      </section>

      <section class="max-w-[1400px] mx-auto px-5 sm:px-8 lg:px-12 pb-12">
        <div class="gallery" id="work-grid"></div>
      </section>

      <section class="max-w-[1400px] mx-auto px-5 sm:px-8 lg:px-12 py-28 text-center">
        <h2 class="display-md mx-auto max-w-2xl reveal">
          See something you want to commission, license, or collect?
        </h2>
        <div class="mt-8 flex justify-center gap-3 reveal reveal-1">
          <a class="btn btn-solid" href="book.html">Book a shoot</a>
          <a class="btn btn-ghost" href="prints.html">Browse prints</a>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="assets/js/gallery-data.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
